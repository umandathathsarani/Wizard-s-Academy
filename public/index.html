<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard's Academy</title>
    <meta name="description" content="A magical web application with mini-games">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="magic-cursor">🪄</div>
    <div id="sparkle-container"></div>
    <div id="fog-container"></div>
    <div id="stars-container"></div>
    <div id="candles-container"></div>
    
    <div class="app-container">
        <header class="hero">
            <h1 class="glow-text">Wizard's Academy</h1>
            <p class="subtitle">Magic begins with curiosity.</p>
        </header>
        
        <main id="main-content">
            <div class="menu-buttons">
                <button class="magical-btn" onclick="location.href='#games'">Play Games</button>
                <button class="magical-btn" onclick="location.href='#leaderboard'">Leaderboard</button>
                <button class="magical-btn" onclick="location.href='#about'">About</button>
                <button class="magical-btn" onclick="location.href='#settings'">Settings</button>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
