<div class="profile-container gs-reveal">
    <button class="btn-back magical-btn-small" onclick="navigateTo('view-home')">⟵ BACK</button>
    <button class="btn-logout magical-btn-small" onclick="RPGEngine.logout()" style="position: absolute; top: 20px; right: 20px; background: rgba(200, 50, 50, 0.5); border-color: #ff5555; color: #fff; padding: 0.75rem 1.5rem; font-size: 0.9rem;">LOG OUT</button>
    <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar">🧙‍♂️</div>
        <div class="profile-info">
            <h2 id="profile-name" class="glow-text">Wizard Name</h2>
            <p id="profile-house" class="profile-house">HOUSE</p>
            <div class="level-badge">Level <span id="profile-level">1</span></div>
        </div>
    </div>
    
    <div class="profile-stats">
        <div class="stat-card">
            <h3>EXPERIENCE</h3>
            <div class="xp-bar-container">
                <div class="xp-bar" id="profile-xp-bar" style="width: 0%"></div>
            </div>
            <p id="profile-xp-text">0 / 100 XP</p>
        </div>
        <div class="stat-card">
            <h3>WEALTH</h3>
            <p class="galleons"><span class="coin-icon">🪙</span> <span id="profile-coins">0</span> Galleons</p>
        </div>
    </div>
    
    <div class="profile-tabs">
        <button class="tab-btn active" id="tab-overview" onclick="switchProfileTab('overview')">Overview</button>
        <button class="tab-btn" onclick="navigateTo('view-diagon-alley')">Inventory (Shop)</button>
        <button class="tab-btn" id="tab-quests" onclick="switchProfileTab('quests')">Daily Quests</button>
    </div>
    
    <div class="profile-content" id="profile-content-overview">
        <p class="placeholder-text">Play mini-games to earn XP and Galleons!</p>
        <div style="margin: 1.5rem 0;">
            <h3 style="color:var(--accent-color); font-family:var(--font-heading); margin-bottom: 0.5rem;">Equipped Wand</h3>
            <div id="profile-wand" style="font-size: 1.5rem; background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 10px; border: 1px solid var(--accent-color); display: inline-block;">
                🪄 Basic Wood Wand
            </div>
        </div>
        <button class="magical-btn" onclick="navigateTo('view-games')">PLAY GAMES</button>
    </div>
    
    <div class="profile-content" id="profile-content-quests" style="display: none;">
        <h3 style="color:var(--accent-color); font-family:var(--font-heading); margin-bottom: 1rem; text-align: center;">Daily Quests</h3>
        <p style="color:#aaa; margin-bottom: 2rem;">Complete quests to earn Galleons and XP! Quests reset daily.</p>
        <div id="quests-container" style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
            <!-- Quests injected here -->
        </div>
    </div>
</div>
