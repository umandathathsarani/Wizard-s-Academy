<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard's Academy</title>
    <meta name="description" content="A magical web application with mini-games">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/games/spell-casting.css">
    <link rel="stylesheet" href="css/games/potion-mixing.css">
    <link rel="stylesheet" href="css/games/memory-cards.css">
    <link rel="stylesheet" href="css/games/house-quiz.css">
    <link rel="stylesheet" href="css/games/flying-challenge.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="preloader-logo">🪄</div>
        <div class="preloader-text">Loading Magic...</div>
    </div>

    <!-- Audio Assets -->
    <audio id="audio-ambient" loop>
        <source src="sounds/ambient.mp3" type="audio/mpeg">
    </audio>
    <audio id="audio-hover">
        <source src="sounds/hover.mp3" type="audio/mpeg">
    </audio>
    <audio id="audio-click">
        <source src="sounds/click.mp3" type="audio/mpeg">
    </audio>

    <div id="magic-cursor">🪄</div>
    
    <!-- Parallax Background Layers -->
    <div id="parallax-container">
        <div class="parallax-layer layer-bg" data-depth="0.05"></div>
        <div class="parallax-layer layer-stars" data-depth="0.1" id="stars-container"></div>
        <div class="parallax-layer layer-castle" data-depth="0.15"></div>
        <div class="parallax-layer layer-fog layer-fog-back" data-depth="0.25"></div>
        <div class="parallax-layer layer-candles" data-depth="0.4" id="candles-container"></div>
        <div class="parallax-layer layer-fog layer-fog-front" data-depth="0.5"></div>
        
        <!-- Wizard Silhouette -->
        <div class="parallax-layer layer-wizard" data-depth="0.6">
            <svg class="wizard-silhouette" viewBox="0 0 100 200" fill="#020305" xmlns="http://www.w3.org/2000/svg">
                <path d="M45,20 C45,10 55,10 55,20 L60,40 L40,40 Z" /> <!-- Hat -->
                <circle cx="50" cy="45" r="8" /> <!-- Head -->
                <path d="M30,60 Q50,50 70,60 L85,150 L15,150 Z" /> <!-- Cloak -->
                <path d="M80,80 L95,60 L97,62 L82,82 Z" /> <!-- Wand arm -->
            </svg>
        </div>
        
        <div class="parallax-layer layer-vignette" data-depth="0"></div>
    </div>
    
    <div id="sparkle-container"></div>
    
    <div class="app-container">
        <!-- Home View -->
        <div id="view-home" class="view active"></div>

        <!-- Games Selection View -->
        <div id="view-games" class="view hidden"></div>

        <!-- Spell Casting Game View -->
        <div id="view-spell-casting" class="view hidden"></div>

        <!-- Potion Mixing Game View -->
        <div id="view-potion-mixing" class="view hidden"></div>

        <!-- Memory Cards Game View -->
        <div id="view-memory-cards" class="view hidden"></div>
        
        <!-- House Quiz Game View -->
        <div id="view-house-quiz" class="view hidden"></div>
        
        <!-- Flying Challenge Game View -->
        <div id="view-flying-challenge" class="view hidden"></div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/games/spell-casting.js"></script>
    <script src="js/games/potion-mixing.js"></script>
    <script src="js/games/memory-cards.js"></script>
    <script src="js/games/house-quiz.js"></script>
    <script src="js/games/flying-challenge.js"></script>
</body>
</html>
