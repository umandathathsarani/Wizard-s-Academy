<div class="game-container gs-reveal">
    <button class="btn-back magical-btn-small" onclick="navigateTo('view-games')">⟵ BACK TO MAP</button>
    
    <div class="game-header">
        <h2 class="glow-text">The Greenhouses</h2>
        <p>Repot the screaming Mandrakes quickly before you lose all your stamina!</p>
    </div>
    
    <div class="herbology-game">
        <div class="herbology-hud">
            <div class="herbology-stat">Score: <span id="herb-score">0</span></div>
            <div class="herbology-stat">Stamina: <div class="stamina-bar"><div id="herb-stamina" class="stamina-fill"></div></div></div>
            <div class="herbology-stat">Time: <span id="herb-time">30</span>s</div>
        </div>
        
        <div class="pots-grid" id="pots-grid">
            <!-- 9 pots generated by JS -->
        </div>
        
        <div class="herb-start-screen" id="herb-start-screen">
            <button class="magical-btn" onclick="HerbologyGame.start()">Put on Earmuffs & Start</button>
        </div>
    </div>
</div>
